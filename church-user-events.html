<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교회 커뮤니티 - 사용자 일정</title>
    <link rel="stylesheet" href="church-theme.css" />
  </head>
  <body class="church-user-body">
    <main class="church-user-shell">
      <section class="church-user-header">
        <div>
          <p class="church-mono">MEMBER APPLICATION</p>
          <h1>일정 및 행사</h1>
          <p>일정 목록 보기와 행사 상세 보기 흐름을 사용자 앱 형태로 구성했습니다.</p>
        </div>
        <div class="topbar-actions">
          <a class="line-chip" href="church-user.html">홈으로</a>
          <a class="solid-chip" href="church-user-about.html">교회 소개</a>
        </div>
      </section>
      <section class="member-section">
        <div class="section-title-row church-title-row">
          <div><p class="church-mono">EVENT CALENDAR</p><h3>다가오는 일정</h3></div>
          <span class="status-pill">이번 주 3건</span>
        </div>
        <div class="calendar-preview">
          <div class="calendar-column"><strong>예배 일정</strong><ul><li>주일 1부 예배 09:00</li><li>주일 2부 예배 11:00</li><li>청년예배 14:00</li></ul></div>
          <div class="calendar-column"><strong>행사 일정</strong><ul><li>4/20 청년부 소풍</li><li>4/21 새가족 환영식</li><li>4/25 봄철 연합기도회</li></ul></div>
        </div>
      </section>
    </main>
  </body>
</html>
