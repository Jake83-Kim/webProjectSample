<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알바 구인/구직 관리</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .search-bar {
            margin-bottom: 1rem;
        }
        .search-bar input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .list {
            list-style: none;
            padding: 0;
        }
        .list li {
            background: #222;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .chat-section {
            margin-top: 1rem;
        }
        .chat-messages {
            background: #222;
            padding: 1rem;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
        }
        .chat-input {
            display: flex;
            margin-top: 0.5rem;
        }
        .chat-input input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #333;
            color: #fff;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>알바 구인/구직 관리</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>구인/구직 전체 조회 및 검색</h2>
            <div class="search-bar">
                <input type="text" placeholder="검색어 입력">
            </div>
            <ul class="list">
                <li>구인 공고 1: 바텐더 구함 <button class="btn">상세 보기</button></li>
                <li>구직 지원 1: 바텐더 경력자 <button class="btn">상세 보기</button></li>
            </ul>
        </div>
        <div class="section">
            <h2>등록 기능</h2>
            <form>
                <div class="form-group">
                    <label for="job-title">제목</label>
                    <input type="text" id="job-title" placeholder="제목 입력">
                </div>
                <div class="form-group">
                    <label for="job-desc">설명</label>
                    <textarea id="job-desc" placeholder="설명 입력"></textarea>
                </div>
                <button type="submit" class="btn">등록</button>
            </form>
        </div>
        <div class="section">
            <h2>채팅 기능</h2>
            <div class="chat-section">
                <div class="chat-messages">
                    <p>채팅 메시지 1</p>
                    <p>채팅 메시지 2</p>
                </div>
                <div class="chat-input">
                    <input type="text" placeholder="메시지 입력">
                    <button class="btn">보내기</button>
                </div>
            </div>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
