<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사용자 서비스 - 쿠폰함</title>
    <link rel="stylesheet" href="user-theme.css" />
  </head>
  <body class="concept-page concept-light coupon-list-page">
    <div class="user-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <section class="page-head concept-head light-head">
          <h1>쿠폰</h1>
        </section>

        <section class="content concept-light-layout coupon-list-layout">
          <section class="coupon-hero-banner">
            <div>
              <h2>Big Benefits</h2>
              <p>지금 바로 사용 가능한 이달의 특별 쿠폰</p>
            </div>
          </section>

          <section class="coupon-ticket-grid">
            <article class="concept-coupon-ticket claimable">
              <div class="coupon-ticket-meta">
                <span class="ticket-label black">전지점</span>
                <span class="ticket-dday">D-15</span>
              </div>
              <div class="coupon-ticket-body">
                <div>
                  <strong>10,000<span>원 할인</span></strong>
                  <p>3만원 이상 결제 시</p>
                </div>
                <a class="coupon-ticket-action" href="user-coupon-detail.html">쿠폰 받기</a>
              </div>
            </article>

            <article class="concept-coupon-ticket owned">
              <div class="coupon-ticket-meta">
                <span class="ticket-label black">일부지점</span>
                <span class="ticket-dday">D-15</span>
              </div>
              <div class="coupon-ticket-body compact">
                <div>
                  <strong>웰컴 칵테일 1잔</strong>
                  <p>지점마다 다를 수 있습니다.</p>
                </div>
                <span class="owned-mark">보유중</span>
              </div>
            </article>
          </section>
        </section>
      </main>
    </div>

    <footer class="footer light-footer">
      <div class="footer-inner">
        <div>
          <div class="footer-brand">바로가자</div>
          <p>Copyright © 2025, 회사명 Co., Ltd.</p>
        </div>
        <div class="footer-links">
          <a href="user-support.html">이용약관</a>
          <a href="user-support.html"><strong>개인정보처리방침</strong></a>
        </div>
        <div>
          <p>주식회사 OOOOOOOO</p>
          <p>대표자명 OOO</p>
          <p>대표번호 000-0000-0000</p>
        </div>
      </div>
    </footer>

    <script src="user-shell.js"></script>
  </body>
</html>
