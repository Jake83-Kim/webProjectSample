<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 관리</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .list {
            list-style: none;
            padding: 0;
        }
        .list li {
            background: #222;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>결제 관리</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>구독 결제</h2>
            <form>
                <div class="form-group">
                    <label for="plan">구독 플랜</label>
                    <input type="text" id="plan" placeholder="플랜 선택">
                </div>
                <div class="form-group">
                    <label for="card-number">카드 번호</label>
                    <input type="text" id="card-number" placeholder="카드 번호 입력">
                </div>
                <button type="submit" class="btn">결제</button>
            </form>
        </div>
        <div class="section">
            <h2>결제 이력 보기</h2>
            <ul class="list">
                <li>결제 1: 2023-01-01 - 100,000원</li>
                <li>결제 2: 2023-02-01 - 100,000원</li>
            </ul>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
