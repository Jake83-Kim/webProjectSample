<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플랫폼 고객지원</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .faq-item {
            margin-bottom: 1rem;
        }
        .faq-item h3 {
            margin: 0;
            color: #ccc;
            cursor: pointer;
        }
        .faq-item p {
            margin: 0.5rem 0 0 0;
            display: none;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .list {
            list-style: none;
            padding: 0;
        }
        .list li {
            background: #222;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>플랫폼 고객지원</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>FAQ</h2>
            <div class="faq-item">
                <h3>질문 1: 어떻게 회원가입 하나요?</h3>
                <p>답변: 계정 관리 페이지에서 회원가입을 하세요.</p>
            </div>
            <div class="faq-item">
                <h3>질문 2: 비밀번호를 잊었어요.</h3>
                <p>답변: 비밀번호 찾기 기능을 사용하세요.</p>
            </div>
        </div>
        <div class="section">
            <h2>플랫폼 공지사항</h2>
            <ul class="list">
                <li>공지 1: 시스템 업데이트 예정</li>
                <li>공지 2: 새로운 기능 추가</li>
            </ul>
        </div>
        <div class="section">
            <h2>1:1 문의</h2>
            <form>
                <div class="form-group">
                    <label for="inquiry-title">제목</label>
                    <input type="text" id="inquiry-title" placeholder="제목 입력">
                </div>
                <div class="form-group">
                    <label for="inquiry-content">내용</label>
                    <textarea id="inquiry-content" placeholder="문의 내용 입력"></textarea>
                </div>
                <button type="submit" class="btn">문의하기</button>
            </form>
        </div>
        <div class="section">
            <h2>약관 열람</h2>
            <p>이용 약관 내용...</p>
            <button class="btn">약관 보기</button>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
    <script>
        document.querySelectorAll('.faq-item h3').forEach(h3 => {
            h3.addEventListener('click', () => {
                const p = h3.nextElementSibling;
                p.style.display = p.style.display === 'block' ? 'none' : 'block';
            });
        });
    </script>
</body>
</html>
