<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>질의/응답 - 2단계</title>
    <link rel="stylesheet" href="user-theme.css" />
  </head>
  <body>
    <div class="user-shell">
      <aside class="sidebar"></aside>
      <main class="main">
        <section class="page-head"><h1>질의/응답 작성</h1></section>
        <section class="content content-stack qa-flow-page">
          <section class="qa-flow-header">
            <div><p class="section-kicker">STEP 02 OF 05</p><h2>어느 바 또는 어떤 상황에 대한 문의인지 알려주세요.</h2></div>
            <div class="qa-progress"><span style="width: 40%"></span></div>
          </section>
          <section class="qa-form-card">
            <div class="field-grid">
              <div><label for="bar-name">관련 바 이름</label><input id="bar-name" type="text" placeholder="예: 리버 12B" /></div>
              <div><label for="visit-area">방문 지역</label><input id="visit-area" type="text" placeholder="예: 성수 / 한남 / 연남" /></div>
            </div>
            <div class="field-grid">
              <div><label for="visit-date">방문 예정일 또는 방문일</label><input id="visit-date" type="text" placeholder="예: 2026.04.18 금요일" /></div>
              <div><label for="reservation-code">예약 번호</label><input id="reservation-code" type="text" placeholder="선택 입력" /></div>
            </div>
            <div><label for="location-note">상황 메모</label><textarea id="location-note" placeholder="매장 입구를 찾기 어려웠거나, 예약 정보와 실제 안내가 달랐던 부분이 있다면 적어주세요."></textarea></div>
            <div class="qa-nav-row"><a class="btn-ghost" href="user-qa-step-1.html">이전</a><a class="btn-primary" href="user-qa-step-3.html">다음</a></div>
          </section>
        </section>
      </main>
    </div>

    <script src="user-shell.js"></script>
