<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바 정보 관리</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 0.5rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .list {
            list-style: none;
            padding: 0;
        }
        .list li {
            background: #222;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>바 정보 관리</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>바 정보 등록 및 수정</h2>
            <form>
                <div class="form-group">
                    <label for="bar-name">바 이름</label>
                    <input type="text" id="bar-name" placeholder="바 이름 입력">
                </div>
                <div class="form-group">
                    <label for="bar-desc">설명</label>
                    <textarea id="bar-desc" placeholder="바 설명 입력"></textarea>
                </div>
                <div class="form-group">
                    <label for="bar-address">주소</label>
                    <input type="text" id="bar-address" placeholder="주소 입력">
                </div>
                <button type="submit" class="btn">저장</button>
            </form>
        </div>
        <div class="section">
            <h2>후기 보기</h2>
            <ul class="list">
                <li>후기 1: 좋은 분위기였어요.</li>
                <li>후기 2: 서비스가 친절합니다.</li>
            </ul>
        </div>
        <div class="section">
            <h2>가게 소식 관리</h2>
            <form>
                <div class="form-group">
                    <label for="news-title">제목</label>
                    <input type="text" id="news-title" placeholder="소식 제목">
                </div>
                <div class="form-group">
                    <label for="news-content">내용</label>
                    <textarea id="news-content" placeholder="소식 내용"></textarea>
                </div>
                <button type="submit" class="btn">등록</button>
            </form>
        </div>
        <div class="section">
            <h2>예약 문의 관리</h2>
            <ul class="list">
                <li>예약 문의 1: 5명 예약 요청</li>
                <li>예약 문의 2: 3명 예약 요청</li>
            </ul>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
