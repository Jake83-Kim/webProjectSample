<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>발주 이력 관리</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .list {
            list-style: none;
            padding: 0;
        }
        .list li {
            background: #222;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>발주 이력 관리</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>발주 이력 보기</h2>
            <ul class="list">
                <li>발주 1: 상품 A - 10개 - 2023-01-01</li>
                <li>발주 2: 상품 B - 5개 - 2023-01-02</li>
            </ul>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
