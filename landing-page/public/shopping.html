<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장님 쇼핑</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .search-bar {
            margin-bottom: 1rem;
        }
        .search-bar input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        .product-card {
            background: #222;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .detail {
            margin-top: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>사장님 쇼핑</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>상품 전체 조회 및 검색</h2>
            <div class="search-bar">
                <input type="text" placeholder="상품 검색">
            </div>
            <div class="grid">
                <div class="product-card">
                    <img src="placeholder.jpg" alt="상품1">
                    <h3>상품 1</h3>
                    <p>가격: 10,000원</p>
                    <button class="btn">상세 보기</button>
                </div>
                <div class="product-card">
                    <img src="placeholder.jpg" alt="상품2">
                    <h3>상품 2</h3>
                    <p>가격: 20,000원</p>
                    <button class="btn">상세 보기</button>
                </div>
            </div>
        </div>
        <div class="section">
            <h2>상품 상세 보기</h2>
            <div class="detail">
                <h3>상품 1 상세</h3>
                <p>설명: 좋은 상품입니다.</p>
                <button class="btn">발주 요청</button>
            </div>
        </div>
        <div class="section">
            <h2>발주 요청</h2>
            <form>
                <div class="form-group">
                    <label for="product-id">상품 ID</label>
                    <input type="text" id="product-id" placeholder="상품 ID">
                </div>
                <div class="form-group">
                    <label for="quantity">수량</label>
                    <input type="number" id="quantity" placeholder="수량">
                </div>
                <button type="submit" class="btn">요청</button>
            </form>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
