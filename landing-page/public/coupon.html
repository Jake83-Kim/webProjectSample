<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠폰 사용</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #333 0%, #555 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .section {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            margin: 0 0 1rem 0;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>쿠폰 사용</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>쿠폰 사용 처리</h2>
            <form>
                <div class="form-group">
                    <label for="coupon-code">쿠폰 코드</label>
                    <input type="text" id="coupon-code" placeholder="쿠폰 코드 입력">
                </div>
                <div class="form-group">
                    <label for="customer-id">고객 ID</label>
                    <input type="text" id="customer-id" placeholder="고객 ID 입력">
                </div>
                <button type="submit" class="btn">쿠폰 사용</button>
            </form>
        </div>
        <a href="owner.html" class="back-link">뒤로 가기</a>
    </div>
</body>
</html>
