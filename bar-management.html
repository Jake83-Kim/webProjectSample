<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바 정보 관리</title>
        <style>
  @import url("https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap");
  :root {
    --bg: #0d0b0b;
    --surface: #161314;
    --surface-strong: #1f1b1a;
    --text: #f5f0ec;
    --muted: #bfa997;
    --accent: #c22f1b;
    --accent-2: #ff6a1c;
    --border: #2f2723;
    --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'NanumSquare_ac', 'Nanum Square', 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(180deg, #080607 0%, var(--bg) 100%);
    color: var(--text);
    line-height: 1.6;
  }
  body a {
    color: var(--accent-2);
    text-decoration: none;
  }
  body a:hover {
    text-decoration: underline;
  }
  .header {
    background: linear-gradient(135deg, #1f1412 0%, #2a1612 100%);
    color: #fff;
    padding: 2rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid #2a221f;
  }
  .header h1 {
    margin: 0;
    font-size: 2.6rem;
    letter-spacing: 0.02em;
  }
  .header p {
    margin: 0.75rem auto 0;
    max-width: 760px;
    color: #d9c5b4;
  }
  .container {
    width: clamp(320px, 92%, 1200px);
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  .section,
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .section {
    padding: 1.75rem;
    margin-bottom: 1.75rem;
  }
  .card {
    padding: 1.75rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-bottom: 1.75rem;
  }
  .card:hover,
  .section:hover {
    transform: translateY(-2px);
  }
  .card,
  .section {
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .card h3,
  .section h2 {
    margin: 0 0 1rem;
    color: #fff;
  }
  .card p,
  .section p,
  .feature,
  .form-group label,
  .list li,
  .projects li,
  .faq-item p,
  .chat-messages,
  .skill {
    color: var(--muted);
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }
  .feature {
    display: inline-flex;
    align-items: center;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    background: #221919;
    color: #f2d6c4;
    font-size: 0.88rem;
    letter-spacing: 0.01em;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: var(--accent-2);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 0.95rem 1.6rem;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .btn:hover {
    background: #d45518;
    transform: translateY(-1px);
  }
  .back-link {
    display: inline-block;
    margin-top: 1.5rem;
    color: var(--accent-2);
    font-weight: 600;
  }
  .back-link:hover {
    text-decoration: underline;
  }
  .form-group {
    margin-bottom: 1.2rem;
  }
  .form-group label {
    display: block;
    margin-bottom: 0.55rem;
    color: var(--muted);
  }
  input,
  textarea,
  select {
    width: 100%;
    padding: 0.95rem 1rem;
    border-radius: 12px;
    border: 1px solid #2f2723;
    background: #120f0f;
    color: #f4ece2;
    outline: none;
    font: inherit;
  }
  input::placeholder,
  textarea::placeholder {
    color: #7b6e67;
  }
  textarea {
    min-height: 140px;
    resize: vertical;
  }
  .list,
  .projects {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .list li,
  .projects li {
    background: #120f0f;
    border: 1px solid #2f2723;
    border-radius: 14px;
    padding: 1rem 1.15rem;
    margin-bottom: 0.9rem;
  }
  .list li strong,
  .projects li strong {
    color: #fff;
  }
  .search-bar {
    margin-bottom: 1rem;
  }
  .search-bar input {
    max-width: 100%;
  }
  .chat-messages {
    background: #120f0f;
    border: 1px solid #2f2723;
    border-radius: 14px;
    padding: 1rem;
    height: 220px;
    overflow-y: auto;
    color: var(--muted);
  }
  .chat-input {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.85rem;
  }
  .chat-input input {
    flex: 1;
  }
  .profile {
    text-align: center;
    margin-bottom: 2rem;
  }
  .profile h1 {
    margin: 0;
    color: #fff;
    font-size: 2.4rem;
  }
  .profile p {
    margin: 0.75rem auto 0;
    color: #d8c6b8;
    font-size: 1.05rem;
  }
  .skills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .skill {
    display: inline-flex;
    align-items: center;
    padding: 0.5rem 0.9rem;
    border-radius: 999px;
    border: 1px solid #3d302c;
    background: #1f1612;
    color: #f0d7c0;
    font-size: 0.9rem;
  }
  .projects a {
    color: var(--accent-2);
  }
  .projects a:hover {
    text-decoration: underline;
  }
  .contact {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid #2a211d;
  }
  .faq-item h3 {
    margin: 0;
    color: #fff;
    cursor: pointer;
  }
  .faq-item p {
    margin: 0.75rem 0 0;
    display: none;
    color: var(--muted);
  }
  @media (max-width: 720px) {
    body {
      padding: 1rem;
    }
    .header {
      padding: 1.5rem 1rem;
    }
    .container {
      padding: 1rem;
    }
  }
</style>
</head>
